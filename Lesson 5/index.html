<!DOCTYPE html>
<html>
<head>
	<title>Lesson 5</title>

	<style>
		table, th, td {
			border: 1px solid black;
			border-collapse: collapse;
			padding: 20px;
		}
	</style>
</head>
<body>
	
	<h1>HTML Tables, Lists</h1>


	<table>
		<thead>
			<tr> <!-- tr = table row -->
				<th>#</th> <!-- th = table head -->
				<th>Emri</th>
				<th>Mbiemri</th>
				<th>Tel</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>1</td>  <!-- table data -->
				<td>Lirak</td>
				<td>Hamiti</td>
				<td>044-456-789</td>
			</tr>
			<tr>
				<td>2</td>  <!-- table data -->
				<td>Filan</td>
				<td>Fisteku</td>
				<td>044-123-789</td>
			</tr>
			<tr>
				<td>3</td>  <!-- table data -->
				<td>John</td>
				<td>Doe</td>
				<td>044-123-123</td>
			</tr>
		</tbody>
		<tfoot>
			<tr>
				<td colspan="4">Tabela e te dhenave te perdoruesve</td>
			</tr>
		</tfoot>
	</table>

</body>
</html>
